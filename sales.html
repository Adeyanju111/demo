<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Products | GenNext Technologies</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ===== RESET & BASE ===== */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#ffffff; color:#1A1A1A; overflow-x:hidden; }
    a { text-decoration:none; color:inherit; }

    /* ===== HEADER ===== */
    header {
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size:1.4rem; font-weight:800; letter-spacing:-0.5px; color:#1A1A1A; }
    .logo span { color:#fbbf24; }
    .hamburger {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: #1A1A1A;
      border-radius: 2px;
    }
    .cart-icon {
      position: relative;
      font-size: 1.3rem;
      color: #1A1A1A;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
    }
    .cart-icon:hover { color: #fbbf24; }
    .cart-count {
      position: absolute;
      top: -2px;
      right: -6px;
      background: #fbbf24;
      color: #1A1A1A;
      font-size: 0.6rem;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== MOBILE DRAWER ===== */
    .mobile-drawer {
      position: fixed;
      top: 0;
      left: -300px;
      width: 280px;
      height: 100vh;
      background: #ffffff;
      z-index: 1050;
      transition: left 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
      box-shadow: 8px 0 40px rgba(0,0,0,0.06);
      padding: 2rem 1.8rem;
      display: flex;
      flex-direction: column;
    }
    .mobile-drawer.open { left: 0; }
    .drawer-close {
      align-self: flex-end;
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: #1A1A1A;
      margin-bottom: 2rem;
    }
    .mobile-nav-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .mobile-nav-links a {
      font-size: 1.2rem;
      font-weight: 500;
      color: #1A1A1A;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      display: block;
    }
    .mobile-nav-links a:hover { color: #fbbf24; }
    .mobile-nav-links a.active { color: #fbbf24; }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 1040;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
    }
    .overlay.active { opacity: 1; visibility: visible; }

    /* ===== MAIN ===== */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 40px;
    }

    /* ===== CART SUMMARY ===== */
    .cart-summary {
      background: #fbbf24;
      border-radius: 28px;
      padding: 18px 24px;
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .cart-summary .cart-info { display:flex; align-items:center; gap:12px; }
    .cart-summary .cart-info i { font-size:1.8rem; color:#1A1A1A; }
    .cart-summary .cart-info .details { display:flex; flex-direction:column; }
    .cart-summary .cart-info .details .count { font-weight:700; font-size:1.1rem; }
    .cart-summary .cart-info .details .total { font-weight:500; font-size:0.9rem; opacity:0.7; }
    .cart-summary .cart-actions { display:flex; gap:10px; align-items:center; }
    .btn-small {
      background: #1A1A1A;
      border: none;
      padding: 8px 20px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.8rem;
      color: #fbbf24;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-small:hover { background:#333; transform:translateY(-2px); }
    .btn-clear {
      background: transparent;
      border: 1px solid #1A1A1A;
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: 500;
      font-size: 0.7rem;
      color: #1A1A1A;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-clear:hover { background:#1A1A1A; color:#fff; }

    /* ===== HERO ===== */
    .hero-card {
      background: #F5EFE9;
      border-radius: 28px;
      padding: 28px 24px 24px;
      margin-top: 16px;
    }
    .hero-card h1 { font-size:2.4rem; font-weight:700; }
    .hero-card h1 span { color:#fbbf24; }
    .hero-card p { color:#555; margin-top:4px; }

    /* ===== FILTER ===== */
    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid #e0e0e0;
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: 0.3s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #1A1A1A;
      color: #fff;
      border-color: #1A1A1A;
    }

    /* ===== PRODUCT GRID ===== */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 8px;
    }
    .product-card {
      background: #F5EFE9;
      border-radius: 28px;
      padding: 24px;
      transition: 0.3s;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.04);
    }

    /* ===== SLIDER ===== */
    .slider-container {
      position: relative;
      width: 100%;
      height: 220px;
      border-radius: 16px;
      overflow: hidden;
      background: #e8e0d8;
    }
    .slider-container .slides {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.4s ease;
    }
    .slider-container .slides img {
      min-width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .slider-container .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.4);
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 999px;
      font-size: 1rem;
      transition: 0.2s;
      z-index: 5;
    }
    .slider-container .slider-btn:hover { background: rgba(0,0,0,0.7); }
    .slider-container .slider-btn.prev { left: 8px; }
    .slider-container .slider-btn.next { right: 8px; }
    .slider-dots {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 5;
    }
    .slider-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
    }
    .slider-dots span.active { background: #fbbf24; }

    /* ===== PRODUCT META ===== */
    .product-card .tag {
      display: inline-block;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #555;
      background: rgba(255,255,255,0.6);
      margin-top: 12px;
      align-self: flex-start;
    }
    .product-card h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 8px;
    }
    .product-card .price {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1A1A1A;
      margin-top: 4px;
    }
    .product-card .desc {
      font-size: 0.9rem;
      color: #555;
      margin-top: 4px;
      flex: 1;
    }
    .product-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .btn-buy {
      background: #1A1A1A;
      border: none;
      padding: 10px 24px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.8rem;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      justify-content: center;
    }
    .btn-buy:hover { background:#333; transform:translateY(-2px); }
    .btn-cart {
      background: transparent;
      border: 1.5px solid #1A1A1A;
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 500;
      font-size: 0.8rem;
      color: #1A1A1A;
      cursor: pointer;
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-cart:hover { background:#1A1A1A; color:#fff; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      grid-column: 1 / -1;
    }
    .empty-state i {
      font-size: 3rem;
      color: #ddd;
      margin-bottom: 16px;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1A1A1A;
      color: #fff;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      opacity: 0;
      transition: 0.4s;
      z-index: 2000;
      pointer-events: none;
    }
    .toast.show { opacity: 1; bottom: 40px; }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 32px 24px 20px;
      color: #999;
      font-size: 0.8rem;
      border-top: 1px solid rgba(0,0,0,0.04);
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 600px) {
      .product-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 900px) {
      .product-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 480px) {
      main { padding: 0 16px 32px; }
      .hero-card { padding: 20px 16px; }
      .hero-card h1 { font-size: 1.8rem; }
      .cart-summary { flex-direction: column; align-items: stretch; }
      .cart-summary .cart-actions { justify-content: flex-end; }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->

  <div class="nav-container">
    <div class="logo">GenNext<span>Tech</span></div>
    <div style="display:flex; align-items:center; gap:12px;">
      <button class="cart-icon" onclick="viewCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></button>

</header>

<!-- ===== MOBILE DRAWER ===== -->
<div class="mobile-drawer" id="mobileDrawer">

  <ul class="mobile-nav-links">

<main>

  <div class="filter-bar">

  <div class="product-grid" id="productGrid"></div>

</main>

<footer>© 2025 GenNext Technologies — Solar Installation & Renewable Energy Nigeria</footer>

<div class="toast" id="toast"></div>

<!-- ===== SCRIPTS ===== -->
<script>
  // ================================================================
  //  🔧 EDIT YOUR PRODUCTS HERE – ADD, REMOVE, OR UPDATE ITEMS
  // ================================================================
  const productsData = [
    {
      id: '1',
      name: '5kW Hybrid Inverter',
      category: 'inverter',
      price: 850000,
      description: 'Pure sine wave, 48V, MPPT charger, LCD display.',
      images: [
        'https://drive.google.com/uc?export=view&id=YOUR_FILE_ID_1',
        'https://drive.google.com/uc?export=view&id=YOUR_FILE_ID_2'
      ]
    },
    {
      id: '2',
      name: '450W Monocrystalline Panel',
      category: 'panel',
      price: 220000,
      description: 'High efficiency 24V panel, 22.5% efficiency.',
      images: [
        'https://drive.google.com/uc?export=view&id=YOUR_FILE_ID_3'
      ]
    },
    {
      id: '3',
      name: '200Ah Lithium Battery',
      category: 'battery',
      price: 1200000,
      description: 'LiFePO4, 12.8V, 5000+ cycles, built-in BMS.',
      images: [
        'https://drive.google.com/uc?export=view&id=YOUR_FILE_ID_4',
        'https://drive.google.com/uc?export=view&id=YOUR_FILE_ID_5'
      ]
    },
    {
      id: '4',
      name: '60A MPPT Charge Controller',
      category: 'controller',
      price: 185000,
      description: '12/24/48V auto, LCD display, temperature sensor.',
      images: [
        'https://drive.google.com/uc?export=view&id=YOUR_FILE_ID_6'
      ]
    }
    // 👇 Add more products following the same format
    // {
    //   id: '5',
    //   name: 'Product Name',
    //   category: 'inverter',
    //   price: 999999,
    //   description: 'Product description.',
    //   images: ['https://drive.google.com/uc?export=view&id=FILE_ID']
    // }
  ];

  // ================================================================
  //  DO NOT EDIT BELOW THIS LINE – THE SCRIPT WILL HANDLE EVERYTHING
  // ================================================================

  const CART_KEY = 'gennext_cart';
  let products = productsData;  // Use the hard-coded array
  let currentFilter = 'all';

  // ===== RENDER PRODUCTS =====
  function renderProducts(filter = 'all') {
    const grid = document.getElementById('productGrid');
    const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);

    if (!filtered.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-box-open"></i>
          <p style="font-size:1.1rem; color:#555;">No products found.</p>
          <p style="font-size:0.9rem; color:#999; margin-top:4px;">Check back later or contact us for inquiries.</p>
        </div>
      `;
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const images = p.images && p.images.length ? p.images : ['https://images.unsplash.com/photo-1509391366360-2e959784a276?w=400&auto=format'];
      const sliderId = `slider-${p.id}`;

      return `
        <div class="product-card">
          <div class="slider-container" id="${sliderId}">
            <div class="slides">
              ${images.map(img => `<img src="${img}" alt="${p.name}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1509391366360-2e959784a276?w=400&auto=format'">`).join('')}
            </div>
            ${images.length > 1 ? `
              <button class="slider-btn prev" onclick="slideProduct('${sliderId}', -1)">‹</button>
              <button class="slider-btn next" onclick="slideProduct('${sliderId}', 1)">›</button>
              <div class="slider-dots">
                ${images.map((_, i) => `<span class="${i===0?'active':''}" onclick="goToSlide('${sliderId}', ${i})"></span>`).join('')}
              </div>
            ` : ''}
          </div>
          <span class="tag">${p.category}</span>
          <h3>${p.name}</h3>
          <div class="price">₦${parseInt(p.price).toLocaleString()}</div>
          <div class="desc">${p.description || ''}</div>
          <div class="product-actions">
            <button class="btn-buy" onclick="buyNow('${p.id}')"><i class="fab fa-whatsapp"></i> Buy Now</button>
            <button class="btn-cart" onclick="addToCart('${p.id}')"><i class="fas fa-plus"></i> Add</button>
          </div>
        </div>
      `;
    }).join('');

    // Initialize sliders
    window._sliderState = {};
    document.querySelectorAll('.slider-container').forEach(container => {
      const id = container.id;
      const slides = container.querySelector('.slides');
      const dots = container.querySelectorAll('.slider-dots span');
      if (slides && slides.children.length > 1) {
        window._sliderState[id] = 0;
        slides.style.transform = 'translateX(0%)';
        if (dots.length) dots[0].classList.add('active');
      }
    });
  }

  // ===== SLIDER FUNCTIONS =====
  function slideProduct(sliderId, delta) {
    const container = document.getElementById(sliderId);
    if (!container) return;
    const slides = container.querySelector('.slides');
    const dots = container.querySelectorAll('.slider-dots span');
    if (!slides || slides.children.length <= 1) return;
    const total = slides.children.length;
    let current = window._sliderState[sliderId] || 0;
    let newIndex = (current + delta + total) % total;
    goToSlide(sliderId, newIndex);
  }

  function goToSlide(sliderId, index) {
    const container = document.getElementById(sliderId);
    if (!container) return;
    const slides = container.querySelector('.slides');
    const dots = container.querySelectorAll('.slider-dots span');
    if (!slides) return;
    const total = slides.children.length;
    if (index < 0) index = 0;
    if (index >= total) index = total - 1;
    slides.style.transform = `translateX(-${index * 100}%)`;
    if (dots.length) {
      dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    }
    window._sliderState[sliderId] = index;
  }

  // ===== FILTER =====
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      renderProducts(currentFilter);
    });
  });

  // ===== CART =====
  function getCart() {
    try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch(e) { return []; }
  }
  function saveCart(cart) {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
    updateCartUI();
  }
  function updateCartUI() {
    const cart = getCart();
    const count = cart.reduce((s, i) => s + i.quantity, 0);
    const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartItemCount').textContent = count + ' items';
    document.getElementById('cartTotal').textContent = '₦' + total.toLocaleString();
  }
  function addToCart(productId) {
    const product = products.find(p => String(p.id) === String(productId));
    if (!product) return;
    let cart = getCart();
    const existing = cart.find(item => String(item.id) === String(productId));
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({ ...product, quantity: 1 });
    }
    saveCart(cart);
    showToast(`✅ Added "${product.name}" to cart`);
  }
  function viewCart() {
    const cart = getCart();
    if (!cart.length) { showToast('🛒 Cart is empty'); return; }
    let total = 0;
    let items = cart.map(item => {
      total += item.price * item.quantity;
      return `  • ${item.name} × ${item.quantity} = ₦${(item.price * item.quantity).toLocaleString()}`;
    }).join('\n');
    const msg = `Hello GenNext! I'd like to order:\n\n📦 My Cart:\n${items}\n\n💰 Total: ₦${total.toLocaleString()}`;
    window.open(`https://wa.me/2347034303991?text=${encodeURIComponent(msg)}`, '_blank');
  }
  function clearCart() {
    saveCart([]);
    showToast('🛒 Cart cleared');
  }
  function buyNow(productId) {
    const product = products.find(p => String(p.id) === String(productId));
    if (!product) return;
    const msg = `Hello GenNext! I'd like to purchase:\n\n🛒 ${product.name}\n📂 ${product.category}\n💰 ₦${product.price.toLocaleString()}\n📝 ${product.description || ''}`;
    window.open(`https://wa.me/2347034303991?text=${encodeURIComponent(msg)}`, '_blank');
  }

  // ===== TOAST =====
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ===== INIT =====
  function init() {
    renderProducts('all');
    updateCartUI();
  }
  init();

  // ===== MOBILE DRAWER =====
  const h = document.getElementById('hamburgerBtn');
  const d = document.getElementById('mobileDrawer');
  const c = document.getElementById('closeDrawerBtn');
  const o = document.getElementById('drawerOverlay');

  function openDrawer() {
    d.classList.add('open');
    o.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    d.classList.remove('open');
    o.classList.remove('active');
    document.body.style.overflow = '';
  }
  h?.addEventListener('click', openDrawer);
  c?.addEventListener('click', closeDrawer);
  o.addEventListener('click', closeDrawer);
  document.querySelectorAll('.mobile-nav-links a').forEach(link => link.addEventListener('click', closeDrawer));
</script>

</body>
</html>
