<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery | GenNext Technologies</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* same styles – keep them */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#ffffff; color:#1A1A1A; overflow-x:hidden; }
    a { text-decoration:none; color:inherit; }
    header {
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size:1.4rem; font-weight:800; letter-spacing:-0.5px; color:#1A1A1A; }
    .logo span { color:#fbbf24; }
    .hamburger {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: #1A1A1A;
      border-radius: 2px;
    }
    .mobile-drawer {
      position: fixed;
      top: 0;
      left: -300px;
      width: 280px;
      height: 100vh;
      background: #ffffff;
      z-index: 1050;
      transition: left 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
      box-shadow: 8px 0 40px rgba(0,0,0,0.06);
      padding: 2rem 1.8rem;
      display: flex;
      flex-direction: column;
    }
    .mobile-drawer.open { left: 0; }
    .drawer-close {
      align-self: flex-end;
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: #1A1A1A;
      margin-bottom: 2rem;
    }
    .mobile-nav-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .mobile-nav-links a {
      font-size: 1.2rem;
      font-weight: 500;
      color: #1A1A1A;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      display: block;
    }
    .mobile-nav-links a:hover { color: #fbbf24; }
    .mobile-nav-links a.active { color: #fbbf24; }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 1040;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
    }
    .overlay.active { opacity: 1; visibility: visible; }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 40px;
    }
    .hero-card {
      background: #F5EFE9;
      border-radius: 28px;
      padding: 28px 24px 24px;
      margin-top: 16px;
    }
    .hero-card h1 { font-size:2.4rem; font-weight:700; }
    .hero-card h1 span { color:#fbbf24; }
    .hero-card p { color:#555; margin-top:4px; }
    .gallery-grid {
      column-count: 3;
      column-gap: 16px;
      padding: 20px 0;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 16px;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
      background: #f5f5f5;
    }
    .gallery-item:hover {
      transform: scale(1.01);
    }
    .gallery-item img {
      width: 100%;
      display: block;
      object-fit: cover;
    }
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 40px;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .lightbox .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2.5rem;
      color: white;
      cursor: pointer;
      background: none;
      border: none;
    }
    .lightbox .prev, .lightbox .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: white;
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 16px 20px;
      cursor: pointer;
      border-radius: 50%;
    }
    .lightbox .prev { left: 20px; }
    .lightbox .next { right: 20px; }
    .lightbox .prev:hover, .lightbox .next:hover {
      background: rgba(255,255,255,0.2);
    }
    @media (max-width: 768px) {
      .gallery-grid { column-count: 2; }
    }
    @media (max-width: 480px) {
      .gallery-grid { column-count: 1; }
      .lightbox { padding: 20px; }
      .lightbox .prev, .lightbox .next { font-size: 1.2rem; padding: 10px 14px; }
    }
    footer {
      text-align: center;
      padding: 32px 24px 20px;
      color: #999;
      font-size: 0.8rem;
      border-top: 1px solid rgba(0,0,0,0.04);
      max-width: 1200px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="nav-container">
    <div class="logo">GenNext<span>Tech</span></div>
    <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- ===== MOBILE DRAWER ===== -->
<div class="mobile-drawer" id="mobileDrawer">
  <button class="drawer-close" id="closeDrawerBtn"><i class="fas fa-times"></i></button>
  <ul class="mobile-nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="faq.html">FAQ</a></li>
    <li><a href="testimonials.html">Testimonials</a></li>
    <li><a href="sale.html">Shop</a></li>
    <li><a href="calculator.html">Calculator</a></li>
  </ul>
</div>
<div class="overlay" id="drawerOverlay"></div>

<!-- ===== MAIN ===== -->
<main>
  <div class="hero-card">
    <h1>Photo <span>Gallery</span></h1>
    <p>Images from our projects – hosted on GitHub.</p>
  </div>
  <div class="gallery-grid" id="galleryGrid"></div>
</main>

<footer>© 2025 GenNext Technologies — Solar Installation & Renewable Energy Nigeria</footer>

<!-- ===== LIGHTBOX ===== -->
<div class="lightbox" id="lightbox">
  <button class="close" id="closeLightbox">&times;</button>
  <button class="prev" id="prevImage">‹</button>
  <img id="lightboxImg" src="" alt="Gallery image">
  <button class="next" id="nextImage">›</button>
</div>

<!-- ===== SCRIPTS ===== -->
<script>
  // ================================================================
  //  CONFIGURATION – CHANGE THESE TO MATCH YOUR SETUP
  // ================================================================

  // Option 1: If you use GitHub Pages and the HTML is in the same repo,
  // use a relative path like 'images/'
  // const basePath = 'images/';

  // Option 2: If you want to use the raw GitHub URL (works anywhere):
  // Replace 'your-username', 'your-repo', and 'main' with your details
  const basePath = 'https://raw.githubusercontent.com/your-username/your-repo/main/images/';

  // List your image filenames (only the file names, not the full path)
  const imageFiles = [
    '1(2).jpg',
    'inverter-2.jpg',
    'panel-1.jpg',
    'battery-1.jpg',
    'controller-1.jpg',
    'project-1.jpg',
    'project-2.jpg',
    'project-3.jpg'
    // Add more filenames as needed
  ];

  // ================================================================
  //  Build full image URLs
  // ================================================================
  const imageUrls = imageFiles.map(file => basePath + file);

  // ================================================================
  //  RENDER GALLERY
  // ================================================================
  const gallery = document.getElementById('galleryGrid');

  function renderGallery() {
    if (!imageUrls.length) {
      gallery.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#999;">
        <i class="fas fa-images" style="font-size:3rem; display:block; margin-bottom:16px;"></i>
        <p>No images found. Add some filenames to the list.</p>
      </div>`;
      return;
    }

    gallery.innerHTML = imageUrls.map((url, index) => `
      <div class="gallery-item" onclick="openLightbox(${index})">
        <img src="${url}" alt="Gallery image" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1509391366360-2e959784a276?w=400&auto=format'">
      </div>
    `).join('');
  }

  renderGallery();

  // ================================================================
  //  LIGHTBOX
  // ================================================================
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  let currentIndex = 0;

  function openLightbox(index) {
    currentIndex = index;
    lightboxImg.src = imageUrls[index];
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }

  function showImage(index) {
    if (index < 0) index = imageUrls.length - 1;
    if (index >= imageUrls.length) index = 0;
    currentIndex = index;
    lightboxImg.src = imageUrls[index];
  }

  document.getElementById('closeLightbox').addEventListener('click', closeLightbox);
  document.getElementById('prevImage').addEventListener('click', () => showImage(currentIndex - 1));
  document.getElementById('nextImage').addEventListener('click', () => showImage(currentIndex + 1));

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showImage(currentIndex - 1);
    if (e.key === 'ArrowRight') showImage(currentIndex + 1);
  });

  // ================================================================
  //  MOBILE DRAWER
  // ================================================================
  const h = document.getElementById('hamburgerBtn');
  const d = document.getElementById('mobileDrawer');
  const c = document.getElementById('closeDrawerBtn');
  const o = document.getElementById('drawerOverlay');

  function openDrawer() {
    d.classList.add('open');
    o.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    d.classList.remove('open');
    o.classList.remove('active');
    document.body.style.overflow = '';
  }
  h?.addEventListener('click', openDrawer);
  c?.addEventListener('click', closeDrawer);
  o.addEventListener('click', closeDrawer);
  document.querySelectorAll('.mobile-nav-links a').forEach(link => link.addEventListener('click', closeDrawer));
</script>

</body>
</html>
